<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Show Checklist PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        :root {
            /* Theme 0: Dark Mode Red (Matches Uploaded Image) */
            --bg: #111111;
            --surface: #1E1E1E;
            --fg: #FFFFFF;
            --border: #333333;
            --accent: #E50914; /* Cinematic Red */
            --accent-fg: #FFFFFF;
            --radius: 8px; /* Slightly rounded for sleekness */
        }

        [data-theme="1"] {
            /* Theme 1: Original Brutalist Light */
            --bg: #E5E5E5;
            --surface: #FFFFFF;
            --fg: #111111;
            --border: #111111;
            --accent: #FF3300;
            --accent-fg: #111111;
            --radius: 0px;
        }

        [data-theme="2"] {
            /* Theme 2: Hacker Terminal */
            --bg: #0A0A0A;
            --surface: #111111;
            --fg: #00FF00;
            --border: #004400;
            --accent: #00FF00;
            --accent-fg: #0A0A0A;
            --radius: 0px;
        }

        [data-theme="3"] {
            /* Theme 3: High Contrast Blue */
            --bg: #0000FF;
            --surface: #0000CC;
            --fg: #FFFFFF;
            --border: #FFFFFF;
            --accent: #FFFF00;
            --accent-fg: #000000;
            --radius: 0px;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg);
            color: var(--fg);
            transition: background-color 0s, color 0s;
            overflow-x: hidden;
            margin: 0;
            /* Top padding is now handled by the sticky header to cover the notch */
            padding-bottom: max(3rem, env(safe-area-inset-bottom));
            padding-left: max(1rem, env(safe-area-inset-left));
            padding-right: max(1rem, env(safe-area-inset-right));
        }

        /* Sticky Header */
        #main-header {
            position: sticky;
            top: 0;
            z-index: 100;
            /* Apply safe area directly to the header so background goes behind notch */
            padding-top: max(1.5rem, env(safe-area-inset-top));
            border-bottom: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        /* Slim state for header when scrolling */
        #main-header.slim {
            padding-top: max(0.5rem, env(safe-area-inset-top));
            padding-bottom: 0.5rem;
        }

        #main-header.slim #header-title {
            font-size: 1.5rem;
            line-height: 1.2;
        }

        #main-header.slim #progress-text {
            font-size: 0.75rem;
            margin-top: 0;
        }

        #main-header.slim .brutal-btn {
            min-height: 36px;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        
        #main-header.slim #header-logo {
            width: 2rem;
            height: 2rem;
        }

        #header-title, #progress-text, #header-logo {
            transition: all 0.3s ease;
        }

        /* Sleek UI Components */
        .brutal-border {
            border: 2px solid var(--border);
            border-radius: var(--radius);
        }
        @media (min-width: 768px) {
            .brutal-border { border: 2px solid var(--border); }
        }

        .brutal-shadow {
            box-shadow: 4px 4px 0px var(--border);
        }
        @media (min-width: 768px) {
            .brutal-shadow { box-shadow: 6px 6px 0px var(--border); }
        }

        /* Buttons (Boundaries Removed) */
        .brutal-btn {
            background-color: var(--surface);
            color: var(--fg);
            border: none;
            border-radius: var(--radius);
            box-shadow: 4px 4px 0px var(--border);
            text-transform: uppercase;
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s, all 0.3s ease;
            cursor: pointer;
            min-height: 44px; /* Touch target size for mobile */
        }

        .brutal-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border);
        }

        .brutal-btn-accent {
            background-color: var(--accent);
            color: var(--accent-fg);
            border: none;
            border-radius: var(--radius);
            box-shadow: 4px 4px 0px var(--border);
            text-transform: uppercase;
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s, all 0.3s ease;
            cursor: pointer;
            min-height: 44px;
        }

        .brutal-btn-accent:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border);
        }

        @media (min-width: 768px) {
            .brutal-btn, .brutal-btn-accent {
                box-shadow: 6px 6px 0px var(--border);
            }
            .brutal-btn:active, .brutal-btn-accent:active {
                transform: translate(6px, 6px);
            }
        }

        .brutal-input {
            background-color: var(--bg);
            color: var(--fg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem;
            width: 100%;
            outline: none;
            resize: vertical;
        }

        .brutal-input:focus {
            border-color: var(--accent);
        }

        /* Warning Overlay Animation */
        @keyframes blink {
            0%, 49% { background-color: #FF0000; color: #FFFFFF; }
            50%, 100% { background-color: #FFFFFF; color: #FF0000; }
        }

        #warning-overlay.active {
            display: flex;
            animation: blink 0.2s infinite;
        }

        /* Utilities */
        .completed-item {
            opacity: 0.6;
            filter: grayscale(100%);
        }
        
        .completed-item:hover {
            opacity: 1;
            filter: none;
        }

        .hide { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col" data-theme="0">

    <!-- Header (Now Sticky) -->
    <header id="main-header" class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 md:gap-4 p-4 md:p-6 bg-[var(--surface)] brutal-shadow w-full">
        <div class="w-full md:w-auto flex items-center">
            <!-- Embedded Sleek Logo -->
            <svg id="header-logo" class="w-10 h-10 md:w-14 md:h-14 mr-3 md:mr-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Clipboard Background -->
                <rect x="4" y="4" width="16" height="18" rx="2" fill="var(--bg)" stroke="var(--border)" stroke-width="2.5" stroke-linejoin="miter"/>
                <!-- Clip -->
                <rect x="8" y="2" width="8" height="5" rx="1" fill="var(--accent)" stroke="var(--border)" stroke-width="2.5" stroke-linejoin="miter"/>
                <!-- Checkmark -->
                <path d="M7 13L10.5 16.5L17 9" stroke="var(--fg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div>
                <h1 class="text-3xl md:text-5xl font-bold uppercase tracking-tighter leading-tight" id="header-title">Show Checklist</h1>
                <p class="text-sm md:text-lg font-bold mt-1 md:mt-2 hidden text-[var(--accent)]" id="progress-text">PROGRESS: 0 / 16</p>
            </div>
        </div>
        <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0">
            <button id="load-shows-btn" class="brutal-btn-accent px-4 py-2 md:px-6 md:py-3 text-sm md:text-lg flex-1 md:flex-none">LOAD</button>
            <button id="save-exit-btn" class="hidden brutal-btn px-4 py-2 md:px-6 md:py-3 text-sm md:text-lg flex-1 md:flex-none">SAVE & EXIT</button>
            <button id="theme-btn" class="brutal-btn px-4 py-2 md:px-6 md:py-3 text-sm md:text-lg flex-1 md:flex-none">THEME</button>
        </div>
    </header>

    <!-- Content Wrapper to add padding below the sticky header -->
    <div class="p-4 md:p-8 flex-grow flex flex-col">
        <!-- Start Screen -->
        <main id="start-screen" class="flex-grow flex items-center justify-center flex-col z-10 w-full gap-8 mt-6 md:mt-8">
            
            <!-- Create New Show -->
            <div class="brutal-border p-6 md:p-8 brutal-shadow bg-[var(--surface)] w-full max-w-2xl text-center flex flex-col gap-4">
                <h2 class="text-xl md:text-3xl font-bold leading-tight text-[var(--fg)] border-b-2 border-[var(--border)] pb-4 uppercase">Create New Show</h2>
                
                <div class="text-left flex flex-col gap-2 mt-4">
                    <label class="font-bold uppercase text-sm md:text-lg text-[var(--fg)] opacity-80">Show Name (Required):</label>
                    <input type="text" id="show-name-input" class="brutal-input text-lg md:text-2xl font-bold" placeholder="E.G. SUMMER FESTIVAL 2026">
                </div>

                <div class="text-left flex flex-col gap-2 mb-6">
                    <label class="font-bold uppercase text-sm md:text-lg text-[var(--fg)] opacity-80">Location (Optional):</label>
                    <input type="text" id="show-location-input" class="brutal-input text-lg md:text-2xl font-bold" placeholder="E.G. MAIN STAGE">
                </div>

                <button id="start-btn" class="brutal-btn-accent text-xl md:text-3xl px-4 py-6 md:px-8 w-full">START SETUP SEQUENCE</button>
            </div>

            <!-- Recent Shows -->
            <div id="recent-shows-wrapper" class="w-full max-w-2xl hidden">
                <h3 class="text-lg md:text-2xl font-bold mb-4 uppercase text-center border-b-2 border-[var(--border)] pb-2">Recent Shows</h3>
                <div id="recent-shows-list" class="flex flex-col gap-4">
                    <!-- Injected via JS -->
                </div>
            </div>

        </main>

        <!-- App Content -->
        <main id="app-content" class="flex-grow hidden flex-col max-w-4xl mx-auto w-full z-10 pb-24 relative">
            
            <div id="steps-container" class="flex flex-col gap-12 pt-[35vh] pb-[50vh]">
                <!-- Steps will be generated here -->
            </div>

            <div id="finish-screen" class="hidden brutal-border p-8 md:p-12 brutal-shadow bg-[var(--surface)] text-[var(--fg)] border-[var(--accent)] text-center mt-6 md:mt-8">
                <h2 class="text-3xl md:text-5xl font-bold mb-3 md:mb-4 leading-tight text-[var(--accent)]">SETUP COMPLETE</h2>
                <p class="text-lg md:text-2xl font-bold mb-6">ALL SYSTEMS GO. REVIEW YOUR NOTES OR COPY THE SUMMARY BELOW.</p>
                <textarea id="summary-textarea" class="brutal-input text-base md:text-lg font-bold w-full text-left bg-[var(--bg)] text-[var(--fg)] p-4 mb-4 overflow-hidden" readonly></textarea>
                <button id="copy-summary-btn" class="brutal-btn w-full py-4 text-xl">COPY SUMMARY TO CLIPBOARD</button>
            </div>
            
            <button id="jump-to-active-btn" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 brutal-btn-accent px-6 py-4 text-xl md:text-2xl w-[90%] md:w-auto whitespace-nowrap brutal-shadow">
                RETURN TO ACTIVE STEP
            </button>
        </main>
    </div>

    <!-- Visual Warning Overlay -->
    <div id="warning-overlay" class="hidden fixed inset-0 z-50 flex-col items-center justify-center text-center p-4 md:p-8 pointer-events-none">
        <h1 class="text-5xl md:text-9xl font-bold uppercase tracking-tighter leading-none mb-4 md:mb-8">WARNING</h1>
        <h2 class="text-2xl md:text-6xl font-bold uppercase">SETUP INCOMPLETE</h2>
        <p class="text-base md:text-2xl mt-6 md:mt-8 font-bold bg-black text-white p-3 md:p-4">RETURN TO CONSOLE IMMEDIATELY</p>
    </div>

    <script>
        // --- Data Structure ---
        const rawData = [
            { cat: '1-Presets', items: ['Dimmer', 'Color', 'Gobo', 'Strobe', 'Prism', 'Position', 'Focus', 'Zoom', 'Frost', 'All'] },
            { cat: '2-Group', items: ['Main group', 'Set design group', 'Songs group'] },
            { cat: '3-Layout', items: ['Full update all lay out'] },
            { cat: '4-Patch', items: ['Check all light and all inverted', 'All addressing'] }
        ];

        let checklist = [];
        let currentIndex = 0;
        let isStarted = false;
        let audioCtx = null;
        let currentTheme = 0;

        // Flatten data
        rawData.forEach(group => {
            group.items.forEach(item => {
                checklist.push({
                    category: group.cat,
                    task: item,
                    remarks: '',
                    completed: false
                });
            });
        });

        const totalSteps = checklist.length;

        // --- DOM Elements ---
        const mainHeader = document.getElementById('main-header');
        const startScreen = document.getElementById('start-screen');
        const appContent = document.getElementById('app-content');
        const startBtn = document.getElementById('start-btn');
        const themeBtn = document.getElementById('theme-btn');
        const progressText = document.getElementById('progress-text');
        
        const stepsContainer = document.getElementById('steps-container');
        const jumpToActiveBtn = document.getElementById('jump-to-active-btn');
        const finishScreen = document.getElementById('finish-screen');
        const warningOverlay = document.getElementById('warning-overlay');

        const summaryTextarea = document.getElementById('summary-textarea');
        const copySummaryBtn = document.getElementById('copy-summary-btn');

        const showNameInput = document.getElementById('show-name-input');
        const showLocationInput = document.getElementById('show-location-input');
        const headerTitle = document.getElementById('header-title');
        const saveExitBtn = document.getElementById('save-exit-btn');
        const loadShowsBtn = document.getElementById('load-shows-btn');
        const recentShowsWrapper = document.getElementById('recent-shows-wrapper');
        const recentShowsList = document.getElementById('recent-shows-list');

        let activeObserver = null;
        let currentShowId = null;
        let currentShowMeta = {};

        // --- Audio System ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playWarningSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            // Harsh sawtooth alarm
            osc.type = 'sawtooth';
            
            // Modulate frequency to sound like an alarm
            const now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.1);
            osc.frequency.setValueAtTime(400, now + 0.2);
            osc.frequency.setValueAtTime(600, now + 0.3);
            
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.5);
            
            osc.start(now);
            osc.stop(now + 0.5);
        }

        // --- Header Slimming Logic ---
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                mainHeader.classList.add('slim');
            } else {
                mainHeader.classList.remove('slim');
            }
        });

        // --- Data Persistence ---
        function getSavedShows() {
            try {
                const shows = JSON.parse(localStorage.getItem('grandma3_shows')) || [];
                return shows.sort((a, b) => b.timestamp - a.timestamp); // Sort newest first
            } catch (e) {
                return [];
            }
        }

        function saveShowsList(shows) {
            localStorage.setItem('grandma3_shows', JSON.stringify(shows));
        }

        function saveCurrentShow() {
            if (!currentShowId) return;
            const shows = getSavedShows();
            const showIndex = shows.findIndex(s => s.id === currentShowId);
            
            const showData = {
                id: currentShowId,
                timestamp: currentShowMeta.timestamp,
                date: currentShowMeta.date,
                name: currentShowMeta.name,
                location: currentShowMeta.location,
                currentIndex: currentIndex,
                checklist: checklist
            };

            if (showIndex > -1) {
                shows[showIndex] = showData;
            } else {
                shows.push(showData);
            }
            saveShowsList(shows);
        }

        function renderRecentShows() {
            const shows = getSavedShows();
            if (shows.length === 0) {
                recentShowsWrapper.classList.add('hidden');
                return;
            }

            recentShowsWrapper.classList.remove('hidden');
            recentShowsList.innerHTML = '';

            shows.forEach(show => {
                const progressPct = Math.round((show.currentIndex / show.checklist.length) * 100);
                const isComplete = show.currentIndex >= show.checklist.length;
                
                const div = document.createElement('div');
                div.className = 'brutal-border p-4 bg-[var(--surface)] brutal-shadow flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition-all hover:-translate-y-1';
                div.innerHTML = `
                    <div class="flex-grow">
                        <div class="text-xs md:text-sm font-bold opacity-70 block text-[var(--fg)]">${show.date} ${show.location ? `| ${show.location}` : ''}</div>
                        <div class="text-xl md:text-2xl font-bold uppercase truncate">${show.name}</div>
                        <div class="text-sm font-bold mt-1 ${isComplete ? 'text-[var(--accent)]' : 'text-[var(--fg)] opacity-80'}">PROGRESS: ${show.currentIndex}/${show.checklist.length} (${progressPct}%)</div>
                    </div>
                    <button class="${isComplete ? 'brutal-btn' : 'brutal-btn-accent'} px-6 py-4 text-lg w-full md:w-auto" onclick="loadShow('${show.id}')">
                        ${isComplete ? 'REVIEW' : 'LOAD'}
                    </button>
                `;
                recentShowsList.appendChild(div);
            });
        }

        // Initialize empty checklist structure
        function initChecklist() {
            checklist = [];
            rawData.forEach(group => {
                group.items.forEach(item => {
                    checklist.push({ category: group.cat, task: item, remarks: '', completed: false });
                });
            });
        }

        window.loadShow = function(id) {
            const shows = getSavedShows();
            const show = shows.find(s => s.id === id);
            if (!show) return;

            currentShowId = show.id;
            currentShowMeta = { timestamp: show.timestamp, date: show.date, name: show.name, location: show.location };
            checklist = show.checklist;
            currentIndex = show.currentIndex;
            
            headerTitle.innerText = currentShowMeta.name.toUpperCase();
            startApp();
        };

        // --- App Logic ---
        function buildSteps() {
            stepsContainer.innerHTML = '';
            
            checklist.forEach((item, index) => {
                const div = document.createElement('div');
                div.id = `step-${index}`;
                div.className = 'step-card brutal-border p-5 md:p-8 brutal-shadow bg-[var(--surface)] relative transition-all duration-300';
                
                div.innerHTML = `
                    <div class="step-badge absolute -top-4 md:-top-5 left-2 md:left-4 px-2 md:px-4 py-1 font-bold brutal-border text-sm md:text-lg uppercase">
                        STEP ${index + 1}
                    </div>
                    
                    <div class="mt-3 md:mt-4 mb-1 md:mb-2 text-sm md:text-xl font-bold uppercase tracking-widest text-[var(--fg)] opacity-60">
                        ${item.category}
                    </div>
                    
                    <h2 class="text-2xl md:text-5xl font-bold uppercase mb-4 md:mb-6 leading-tight text-[var(--fg)]">
                        ${item.task}
                    </h2>

                    <div class="mb-4 md:mb-6">
                        <label class="block font-bold mb-1 md:mb-2 text-sm md:text-lg uppercase text-[var(--fg)] opacity-80">Remarks / Notes:</label>
                        <textarea id="remark-${index}" rows="3" class="brutal-input text-base md:text-lg font-bold" placeholder="ENTER REMARKS HERE...">${item.remarks}</textarea>
                    </div>

                    <button id="btn-complete-${index}" class="brutal-btn-accent w-full py-4 md:py-6 text-lg md:text-3xl hidden">
                        MARK STEP COMPLETE
                    </button>
                    
                    <div id="status-${index}" class="hidden text-xl md:text-2xl font-bold text-center border-t-2 border-[var(--border)] pt-4 mt-4 text-[var(--fg)] opacity-60">
                        ✓ COMPLETED
                    </div>
                `;
                
                stepsContainer.appendChild(div);
                
                // Live binding for remarks so user can go back and edit
                const textarea = div.querySelector(`#remark-${index}`);
                textarea.addEventListener('input', (e) => {
                    checklist[index].remarks = e.target.value;
                    saveCurrentShow(); // Auto-save on typing
                    if (currentIndex >= totalSteps) {
                        generateSummary(); // Update live if edited after completion
                    }
                });
                
                // Complete button logic
                const btn = div.querySelector(`#btn-complete-${index}`);
                btn.addEventListener('click', () => {
                    if (index === currentIndex) {
                        checklist[index].completed = true;
                        currentIndex++;
                        saveCurrentShow(); // Auto-save on step complete
                        updateUI();
                    }
                });
            });
        }

        function setupObserver(activeEl) {
            if (activeObserver) activeObserver.disconnect();
            
            activeObserver = new IntersectionObserver((entries) => {
                const entry = entries[0];
                // Show jump button if active step is out of view
                if (entry.isIntersecting || currentIndex >= totalSteps) {
                    jumpToActiveBtn.classList.add('hidden');
                } else {
                    jumpToActiveBtn.classList.remove('hidden');
                }
            }, { threshold: 0.1 }); // Trigger when less than 10% visible
            
            activeObserver.observe(activeEl);
        }

        function centerActiveStep() {
            const activeEl = document.getElementById(`step-${currentIndex}`);
            if (activeEl) {
                // Calculate PERFECT center: Viewport middle minus half the element's height
                const headerHeight = mainHeader.offsetHeight || 80;
                const viewportMiddle = (window.innerHeight + headerHeight) / 2;
                const elementMiddle = activeEl.offsetHeight / 2;
                
                const exactCenterY = activeEl.getBoundingClientRect().top + window.scrollY - viewportMiddle + elementMiddle;
                
                window.scrollTo({top: exactCenterY, behavior: 'smooth'});
                setupObserver(activeEl);
            }
        }

        function updateUI() {
            progressText.innerText = `PROGRESS: ${currentIndex} / ${totalSteps}`;
            
            checklist.forEach((item, index) => {
                const stepDiv = document.getElementById(`step-${index}`);
                const btn = document.getElementById(`btn-complete-${index}`);
                const status = document.getElementById(`status-${index}`);
                const badge = stepDiv.querySelector('.step-badge');
                
                if (index < currentIndex) {
                    // --- COMPLETED ---
                    stepDiv.style.opacity = '0.5';
                    stepDiv.style.pointerEvents = 'auto'; // Still allow text editing
                    stepDiv.style.filter = 'grayscale(100%)';
                    btn.classList.add('hidden');
                    status.classList.remove('hidden');
                    
                    badge.style.backgroundColor = 'var(--border)';
                    badge.style.color = 'var(--fg)';
                    badge.innerText = 'COMPLETED';
                } else if (index === currentIndex) {
                    // --- ACTIVE ---
                    stepDiv.style.opacity = '1';
                    stepDiv.style.pointerEvents = 'auto';
                    stepDiv.style.filter = 'none';
                    btn.classList.remove('hidden');
                    status.classList.add('hidden');
                    
                    badge.style.backgroundColor = 'var(--accent)';
                    badge.style.color = 'var(--accent-fg)';
                    badge.style.borderColor = 'var(--accent)';
                    badge.innerText = 'ACTIVE STEP';
                } else {
                    // --- LOCKED (FUTURE) ---
                    stepDiv.style.opacity = '0.3';
                    stepDiv.style.pointerEvents = 'none'; // Lock interaction
                    stepDiv.style.filter = 'grayscale(100%)';
                    btn.classList.add('hidden');
                    status.classList.add('hidden');
                    
                    badge.style.backgroundColor = 'var(--bg)';
                    badge.style.color = 'var(--fg)';
                    badge.innerText = `LOCKED`;
                }
            });

            if (currentIndex >= totalSteps) {
                stepsContainer.classList.remove('pb-[50vh]');
                finishScreen.classList.remove('hidden');
                finishScreen.classList.add('mb-[50vh]');
                jumpToActiveBtn.classList.add('hidden');
                saveExitBtn.innerText = "RETURN TO MENU"; // Change button text
                
                generateSummary();
                
                setTimeout(() => {
                    const exactCenterY = finishScreen.getBoundingClientRect().top + window.scrollY - 100;
                    window.scrollTo({top: exactCenterY, behavior: 'smooth'});
                }, 100);
                return;
            }

            // Fire precise center logic
            setTimeout(centerActiveStep, 100);
        }

        function startApp() {
            initAudio();
            isStarted = true;
            startScreen.classList.add('hidden');
            appContent.classList.remove('hidden');
            appContent.classList.add('flex');
            
            // Push history state to enable "Back Button" trap for Android PWAs
            window.history.pushState({ locked: true }, '');

            // Update Header for Active Mode
            progressText.classList.remove('hidden');
            saveExitBtn.classList.remove('hidden');
            loadShowsBtn.classList.add('hidden');

            buildSteps();
            updateUI();
        }

        startBtn.addEventListener('click', () => {
            const name = showNameInput.value.trim();
            if (!name) {
                showNameInput.style.borderColor = 'var(--accent)';
                showNameInput.focus();
                setTimeout(() => showNameInput.style.borderColor = 'var(--border)', 1000);
                return;
            }

            // Create new show metadata
            currentShowId = Date.now().toString();
            currentShowMeta = {
                timestamp: Date.now(),
                date: new Date().toLocaleDateString(),
                name: name,
                location: showLocationInput.value.trim()
            };
            
            headerTitle.innerText = currentShowMeta.name.toUpperCase();
            currentIndex = 0;
            initChecklist();
            saveCurrentShow();
            
            startApp();
        });

        saveExitBtn.addEventListener('click', () => {
            saveCurrentShow();
            isStarted = false; // Prevents the warning overlay
            
            // Reset UI
            startScreen.classList.remove('hidden');
            appContent.classList.add('hidden');
            appContent.classList.remove('flex');
            finishScreen.classList.add('hidden');
            jumpToActiveBtn.classList.add('hidden');
            headerTitle.innerText = "Show Checklist";
            saveExitBtn.innerText = "SAVE & EXIT";
            
            // Revert Header for Start Menu Mode
            progressText.classList.add('hidden');
            saveExitBtn.classList.add('hidden');
            loadShowsBtn.classList.remove('hidden');

            window.scrollTo(0,0);
            
            // Clear inputs
            showNameInput.value = '';
            showLocationInput.value = '';
            
            renderRecentShows();
        });

        jumpToActiveBtn.addEventListener('click', () => {
            centerActiveStep();
        });

        loadShowsBtn.addEventListener('click', () => {
            const shows = getSavedShows();
            if (shows.length === 0) {
                const originalText = loadShowsBtn.innerText;
                loadShowsBtn.innerText = "NO SHOWS YET";
                setTimeout(() => {
                    loadShowsBtn.innerText = originalText;
                }, 1500);
            } else {
                recentShowsWrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });

        themeBtn.addEventListener('click', () => {
            currentTheme = (currentTheme + 1) % 4;
            document.body.setAttribute('data-theme', currentTheme.toString());
            
            // Update meta theme color based on CSS variable
            const bgColor = getComputedStyle(document.body).getPropertyValue('--bg').trim();
            document.querySelector('meta[name="theme-color"]').setAttribute('content', bgColor);
        });

        // --- Summary Generation ---
        function generateSummary() {
            let summaryText = `SHOW CHECKLIST - COMPLETION LOG\n`;
            summaryText += `SHOW: ${currentShowMeta.name.toUpperCase()}\n`;
            if (currentShowMeta.location) summaryText += `LOCATION: ${currentShowMeta.location.toUpperCase()}\n`;
            summaryText += `DATE: ${currentShowMeta.date}\n`;
            summaryText += "================================\n";
            
            let currentCat = "";
            checklist.forEach((item) => {
                if (item.category !== currentCat) {
                    summaryText += `\n[ ${item.category.toUpperCase()} ]\n`;
                    currentCat = item.category;
                }
                summaryText += `[X] ${item.task}\n`;
                if (item.remarks.trim() !== '') {
                    summaryText += `    > REMARKS: ${item.remarks.trim()}\n`;
                }
            });
            
            summaryTextarea.value = summaryText;
            
            // Automatically resize textarea to fit all text without scrolling inside
            summaryTextarea.style.height = 'auto';
            summaryTextarea.style.height = (summaryTextarea.scrollHeight + 10) + 'px';
        }

        copySummaryBtn.addEventListener('click', () => {
            summaryTextarea.select();
            document.execCommand('copy');
            const originalText = copySummaryBtn.innerText;
            copySummaryBtn.innerText = "COPIED TO CLIPBOARD!";
            setTimeout(() => {
                copySummaryBtn.innerText = originalText;
            }, 2000);
        });

        // --- Security & Warning Systems ---
        
        let warningActive = false;
        let warningTimer = null;

        function triggerVisualWarning() {
            // Only trigger if started, not finished, and not cleanly exited
            if (warningActive || currentIndex >= totalSteps || !isStarted) return;
            
            warningActive = true;
            warningOverlay.classList.remove('hidden');
            warningOverlay.classList.add('active');
            
            // Haptic Vibration feedback (if supported)
            if (navigator.vibrate) {
                navigator.vibrate([400, 200, 400, 200, 400]);
            }
            
            // Loop alarm sound 3 times
            playWarningSound();
            setTimeout(playWarningSound, 600);
            setTimeout(playWarningSound, 1200);

            // Hide warning after 2.5 seconds if mouse returns
            clearTimeout(warningTimer);
            warningTimer = setTimeout(() => {
                warningOverlay.classList.remove('active');
                warningOverlay.classList.add('hidden');
                warningActive = false;
            }, 2500);
        }

        // 1. Desktop: Detect mouse leaving the top of the viewport (intent to change tab/close)
        document.addEventListener('mouseleave', (e) => {
            if (e.clientY <= 10) {
                triggerVisualWarning();
            }
        });

        // 2. Standard browser beforeunload hook
        window.addEventListener('beforeunload', (e) => {
            if (isStarted && currentIndex < totalSteps) {
                saveCurrentShow(); // Auto-save just in case
                const msg = "SETUP INCOMPLETE. YOUR PROGRESS HAS BEEN SAVED. ARE YOU SURE YOU WANT TO LEAVE?";
                e.preventDefault();
                e.returnValue = msg;
                return msg;
            }
        });

        // 3. PWA App Switcher / Backgrounding Trap (iOS/Android)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && isStarted && currentIndex < totalSteps) {
                saveCurrentShow(); // Auto-save on background
                triggerVisualWarning(); // Will cause app snapshot to flash red in the app switcher
            }
        });

        // 4. Android Back Button Trap
        window.addEventListener('popstate', (e) => {
            if (isStarted && currentIndex < totalSteps) {
                // Trap the user by pushing state forward again
                window.history.pushState({ locked: true }, '');
                triggerVisualWarning();
            }
        });
        
        // Initial render
        renderRecentShows();

    </script>
</body>
</html>
